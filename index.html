<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayur Chhoriya</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#faf8f3;
  color:#1a1a1a;
  font-family:Georgia,"Times New Roman",serif;
  font-size:18px;
  line-height:1.8;
}

/* ================= HEADER ================= */

.site-header{
  max-width:860px;
  margin:0 auto;
  padding:3rem 2rem 0.5rem;
}

.site-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-weight:420;
  font-size:clamp(3rem,9vw,5.5rem);
  line-height:1.02;
  color:#8c1c2e;
  opacity:0;
  transition:opacity 0.4s ease;
  cursor:pointer;
}

.site-title em{
  font-style:italic;
}

.site-tagline{
  font-size:0.85rem;
  color:#b7afa3;
  margin-top:0.4rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

/* ================= NAV ================= */

.site-nav{
  max-width:860px;
  margin:0 auto;
  padding:0 2rem;
  border-bottom:1px solid #e6dfd2;
  margin-top:1.2rem;
}

.site-nav ul{
  list-style:none;
  display:flex;
}

.site-nav li a{
  padding:0.6rem 1.5rem 0.6rem 0;
  font-size:0.88rem;
  color:#b7afa3;
  transition:color 0.2s ease;
  cursor:pointer;
  text-decoration:none;
}

.site-nav li a:hover,
.site-nav li a.active{
  color:#1a1a1a;
}

/* ================= CONTENT ================= */

.site-content{
  max-width:860px;
  margin:0 auto;
  padding:3rem 2rem 6rem;
}

section{
  display:none;
}

section.active{
  display:block;
  animation:fadein .35s ease both;
}

@keyframes fadein{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

/* ================= HERO ================= */

.home-hero{
  display:flex;
  align-items:center;
  margin-bottom:3rem;
}

.home-hero-photo{
  width:210px;
  margin-right:2.2rem;
}

.home-hero-photo img{
  width:100%;
  display:block;
  background:transparent;
  mix-blend-mode:multiply;
  filter:brightness(1.35) contrast(0.75);
}

.home-intro{
  font-size:1rem;
  color:#333;
}

/* ================= CARDS ================= */

.home-sections-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  max-width:580px;
  border-top:1px solid #e6dfd2;
}

.home-sec-card{
  padding:2rem 1.2rem;
  border-bottom:1px solid #e6dfd2;
  text-align:center;
  cursor:pointer;
  transition:background 0.2s ease;
}

.home-sec-card:first-child{
  border-right:1px solid #e6dfd2;
}

.home-sec-card:hover{
  background:#f3eee4;
}

.home-sec-art svg{
  height:180px;
  display:block;
  margin:0 auto;
}

.home-sec-art svg g{
  transform:translateY(6px);
}

.home-sec-label{
  display:inline-block;
  background:#1a1a1a;
  color:#fff;
  font-size:0.64rem;
  letter-spacing:0.14em;
  padding:0.3rem 0.7rem;
  margin-bottom:0.4rem;
}

.home-sec-desc{
  font-size:0.82rem;
  color:#a69e92;
  font-style:italic;
}

/* ================= INTRO OVERLAY ================= */

#intro-overlay{
  position:fixed;
  inset:0;
  background:#faf8f3;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity 0.6s ease;
}

#intro-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(3rem,9vw,5.5rem);
  color:#1a1a1a;
  position:absolute;
  transition:all 1s cubic-bezier(.7,0,.3,1);
}

/* ================= FOOTER ================= */

footer{
  max-width:860px;
  margin:0 auto;
  padding:1.5rem 2rem;
  border-top:1px solid #e6dfd2;
  font-size:0.75rem;
  color:#b7afa3;
}

/* ================= RESPONSIVE ================= */

@media(max-width:580px){
  .home-hero{
    flex-direction:column;
  }

  .home-hero-photo{
    margin-right:0;
    margin-bottom:1.5rem;
    width:160px;
  }

  .home-sections-grid{
    grid-template-columns:1fr;
  }

  .home-sec-card:first-child{
    border-right:none;
  }
}
</style>
</head>

<body>

<div id="intro-overlay">
  <div id="intro-name">Mayur <em>Chhoriya</em></div>
</div>

<div class="site-header">
  <span class="site-title">Mayur <em>Chhoriya</em></span>
  <div class="site-tagline">Bad Choice Road</div>
</div>

<nav class="site-nav">
  <ul>
    <li><a class="active">Home</a></li>
    <li><a>Musings</a></li>
    <li><a>Fun</a></li>
  </ul>
</nav>

<div class="site-content">
<section class="active">

<div class="home-hero">
  <div class="home-hero-photo">
    <img src="t.png" alt="Mayur">
  </div>
  <div class="home-intro">
    Hi, I am Mayur! Welcome to my page.
  </div>
</div>

<div class="home-sections-grid">

<div class="home-sec-card">
  <div class="home-sec-art">
    <!-- Paste MUSINGS SVG here -->
  </div>
  <div class="home-sec-label">Musings</div>
  <div class="home-sec-desc">Thoughts and wild ideas</div>
</div>

<div class="home-sec-card">
  <div class="home-sec-art">
    <!-- Paste FUN SVG here -->
  </div>
  <div class="home-sec-label">Fun</div>
  <div class="home-sec-desc">Films, music & more</div>
</div>

</div>

</section>
</div>

<footer>
© 2026 Mayur Chhoriya
</footer>

<script>
const intro = document.getElementById('intro-overlay');
const introName = document.getElementById('intro-name');
const realTitle = document.querySelector('.site-title');

window.addEventListener('load', () => {

  const headerRect = realTitle.getBoundingClientRect();

  setTimeout(() => {
    introName.style.top = headerRect.top + "px";
    introName.style.left = headerRect.left + "px";
  }, 100);

  setTimeout(() => {
    intro.style.opacity = "0";
    realTitle.style.opacity = "1";
  }, 1200);

  setTimeout(() => {
    intro.remove();
  }, 1800);

});
</script>

</body>
</html>
